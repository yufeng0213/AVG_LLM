<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>哥特式信函</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
      font-family: 'Times New Roman', serif;
      padding: 20px;
    }
    
    .gothic-container {
      position: relative;
      width: 100%;
      max-width: 400px;
    }
    
    .gothic-card {
      position: relative;
      background: linear-gradient(180deg, #1c1c1c 0%, #0f0f0f 100%);
      border: 1px solid #2c2c2c;
      padding: 40px 30px;
      box-shadow: 
        0 0 50px rgba(139, 0, 0, 0.2),
        0 0 100px rgba(0, 0, 0, 0.8),
        inset 0 0 30px rgba(0, 0, 0, 0.5);
    }
    
    .gothic-border {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      border: 1px solid rgba(139, 0, 0, 0.3);
      pointer-events: none;
    }
    
    .gothic-border::before,
    .gothic-border::after {
      content: '';
      position: absolute;
      width: 15px;
      height: 15px;
      border: 1px solid rgba(139, 0, 0, 0.5);
    }
    
    .gothic-border::before {
      top: -5px;
      left: -5px;
      border-right: none;
      border-bottom: none;
    }
    
    .gothic-border::after {
      bottom: -5px;
      right: -5px;
      border-left: none;
      border-top: none;
    }
    
    .ornament-top {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 30px;
      background: linear-gradient(180deg, #2c2c2c 0%, transparent 100%);
      border-radius: 0 0 30px 30px;
    }
    
    .ornament-top::before {
      content: '✦';
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      color: #8b0000;
      font-size: 14px;
    }
    
    .gothic-header {
      text-align: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(139, 0, 0, 0.3);
    }
    
    .gothic-title {
      font-size: 18px;
      color: #8b0000;
      letter-spacing: 4px;
      text-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
      margin-bottom: 10px;
    }
    
    .gothic-meta {
      font-size: 11px;
      color: #555;
      letter-spacing: 1px;
    }
    
    .gothic-content {
      color: #888;
      font-size: 13px;
      line-height: 2;
      text-align: justify;
      margin-bottom: 20px;
    }
    
    .gothic-content::first-letter {
      font-size: 32px;
      float: left;
      color: #8b0000;
      margin-right: 10px;
      margin-top: 5px;
      line-height: 1;
    }
    
    .gothic-signature {
      text-align: right;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid rgba(139, 0, 0, 0.2);
    }
    
    .signature-text {
      font-size: 14px;
      color: #8b0000;
      letter-spacing: 2px;
      font-style: italic;
    }
    
    .wax-seal {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      background: radial-gradient(circle, #8b0000 0%, #4a0000 100%);
      border-radius: 50%;
      box-shadow: 
        0 2px 10px rgba(139, 0, 0, 0.5),
        inset 0 0 10px rgba(0, 0, 0, 0.3);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .wax-seal::before {
      content: '✦';
      color: rgba(255, 255, 255, 0.3);
      font-size: 16px;
    }
    
    .rose-decoration {
      position: absolute;
      bottom: 15px;
      left: 15px;
      width: 30px;
      height: 30px;
      opacity: 0.3;
    }
    
    .rose-decoration::before {
      content: '🌹';
      font-size: 20px;
      color: #8b0000;
    }
    
    .candle-glow {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(139, 0, 0, 0.05) 0%, transparent 50%);
      pointer-events: none;
      animation: flicker-glow 3s ease-in-out infinite;
    }
    
    @keyframes flicker-glow {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.8; }
    }
    
    .bat-decoration {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 12px;
      color: rgba(139, 0, 0, 0.4);
      animation: bat-fly 5s ease-in-out infinite;
    }
    
    @keyframes bat-fly {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-5px) rotate(5deg); }
    }
  </style>
</head>
<body>
  <div class="gothic-container">
    <div class="gothic-card">
      <div class="gothic-border"></div>
      <div class="ornament-top"></div>
      <div class="candle-glow"></div>
      <div class="bat-decoration">🦇</div>
      <div class="rose-decoration"></div>
      
      <div class="gothic-header">
        <div class="gothic-title">{{title}}</div>
        <div class="gothic-meta">致 {{recipient}} · {{date}}</div>
      </div>
      
      <div class="gothic-content">
        {{content}}
      </div>
      
      <div class="gothic-signature">
        <div class="signature-text">{{signature}}</div>
      </div>
      
      <div class="wax-seal"></div>
    </div>
  </div>
</body>
</html>
