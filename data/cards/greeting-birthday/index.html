<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生日贺卡</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Georgia', 'Times New Roman', serif;
      padding: 20px;
      overflow: hidden;
    }
    
    .card-container {
      position: relative;
      width: 100%;
      max-width: 400px;
      perspective: 1000px;
    }
    
    .card {
      position: relative;
      background: linear-gradient(145deg, #fff 0%, #f8f4ff 100%);
      border-radius: 20px;
      padding: 40px 35px;
      box-shadow: 
        0 25px 80px rgba(102, 126, 234, 0.4),
        0 10px 30px rgba(118, 75, 162, 0.3),
        inset 0 2px 0 rgba(255, 255, 255, 0.8);
      transform-style: preserve-3d;
      overflow: hidden;
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 70% 70%, rgba(255, 105, 180, 0.1) 0%, transparent 50%);
      animation: shimmer 3s ease-in-out infinite;
    }
    
    @keyframes shimmer {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(180deg); }
    }
    
    .balloon {
      position: absolute;
      font-size: 28px;
      animation: float 4s ease-in-out infinite;
    }
    
    .balloon:nth-child(1) { top: 15px; left: 20px; animation-delay: 0s; }
    .balloon:nth-child(2) { top: 25px; right: 25px; animation-delay: 0.5s; }
    .balloon:nth-child(3) { top: 10px; left: 50%; animation-delay: 1s; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-10px) rotate(5deg); }
    }
    
    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: fall 5s linear infinite;
    }
    
    .confetti:nth-child(4) { top: -10px; left: 10%; background: #ff6b6b; animation-delay: 0s; }
    .confetti:nth-child(5) { top: -10px; left: 30%; background: #4ecdc4; animation-delay: 1s; }
    .confetti:nth-child(6) { top: -10px; left: 50%; background: #ffe66d; animation-delay: 2s; }
    .confetti:nth-child(7) { top: -10px; left: 70%; background: #95e1d3; animation-delay: 0.5s; }
    .confetti:nth-child(8) { top: -10px; left: 90%; background: #f38181; animation-delay: 1.5s; }
    
    @keyframes fall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(400px) rotate(720deg); opacity: 0; }
    }
    
    .cake-icon {
      text-align: center;
      font-size: 50px;
      margin-bottom: 15px;
      animation: bounce 2s ease-in-out infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .card-title {
      text-align: center;
      font-size: 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 25px;
      font-weight: bold;
      letter-spacing: 3px;
    }
    
    .recipient-name {
      text-align: center;
      font-size: 22px;
      color: #764ba2;
      margin-bottom: 20px;
      font-weight: bold;
    }
    
    .card-content {
      font-size: 15px;
      line-height: 28px;
      color: #4a4a6a;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    
    .card-content p {
      margin-bottom: 12px;
    }
    
    .wish-stars {
      text-align: center;
      margin: 20px 0;
      font-size: 18px;
      letter-spacing: 5px;
    }
    
    .sender-info {
      text-align: right;
      margin-top: 25px;
      color: #8b7ba8;
      font-style: italic;
    }
    
    .sender-info .sender {
      font-size: 16px;
      color: #667eea;
      font-weight: bold;
      font-style: normal;
    }
    
    .candles {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }
    
    .candle {
      width: 6px;
      height: 20px;
      background: linear-gradient(180deg, #ff9a9e 0%, #fad0c4 100%);
      border-radius: 3px 3px 0 0;
      position: relative;
    }
    
    .candle::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 12px;
      background: radial-gradient(ellipse at bottom, #ffd700 0%, #ff6b35 50%, transparent 100%);
      border-radius: 50% 50% 20% 20%;
      animation: flicker 0.5s ease-in-out infinite alternate;
    }
    
    @keyframes flicker {
      0% { transform: translateX(-50%) scale(1); opacity: 1; }
      100% { transform: translateX(-50%) scale(0.9); opacity: 0.8; }
    }
    
    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #ffd700;
      border-radius: 50%;
      animation: sparkle 1.5s ease-in-out infinite;
    }
    
    .sparkle:nth-child(9) { top: 60px; left: 40px; animation-delay: 0s; }
    .sparkle:nth-child(10) { top: 100px; right: 50px; animation-delay: 0.3s; }
    .sparkle:nth-child(11) { bottom: 80px; left: 60px; animation-delay: 0.6s; }
    .sparkle:nth-child(12) { bottom: 120px; right: 40px; animation-delay: 0.9s; }
    
    @keyframes sparkle {
      0%, 100% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="card-container">
    <div class="card">
      <div class="balloon">🎈</div>
      <div class="balloon">🎈</div>
      <div class="balloon">🎈</div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      
      <div class="cake-icon">🎂</div>
      
      <h1 class="card-title">生日快乐</h1>
      
      <div class="recipient-name">亲爱的 {{recipient}}</div>
      
      <div class="card-content">
        {{content}}
      </div>
      
      <div class="wish-stars">✨ 🎁 ✨</div>
      
      <div class="candles">
        <div class="candle"></div>
        <div class="candle"></div>
        <div class="candle"></div>
        <div class="candle"></div>
        <div class="candle"></div>
      </div>
      
      <div class="sender-info">
        <div>你的朋友</div>
        <div class="sender">{{sender}}</div>
      </div>
    </div>
  </div>
</body>
</html>
