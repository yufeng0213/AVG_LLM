<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>偷拍的照片</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
      font-family: 'Georgia', 'Times New Roman', serif;
      padding: 20px;
    }
    
    .photo-container {
      position: relative;
      width: 100%;
      max-width: 380px;
    }
    
    .photo-frame {
      position: relative;
      background: #fff;
      padding: 15px 15px 50px 15px;
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.4),
        0 8px 25px rgba(0, 0, 0, 0.3);
      transform: rotate(-2deg);
    }
    
    .photo-inner {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #f5f5f5;
      overflow: hidden;
      border: 1px solid #ddd;
    }
    
    .photo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #e8e8e8 0%, #d8d8d8 100%);
      color: #888;
    }
    
    .photo-placeholder-icon {
      font-size: 48px;
      margin-bottom: 10px;
      opacity: 0.5;
    }
    
    .photo-placeholder-text {
      font-size: 14px;
      opacity: 0.7;
    }
    
    .photo-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .vignette-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.3) 100%);
      pointer-events: none;
    }
    
    .focus-blur {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      backdrop-filter: blur(2px);
      pointer-events: none;
      opacity: 0.3;
    }
    
    .photo-caption {
      position: absolute;
      bottom: 15px;
      left: 15px;
      right: 15px;
      text-align: center;
      font-size: 14px;
      color: #555;
      font-style: italic;
    }
    
    .photo-date {
      position: absolute;
      bottom: 5px;
      right: 15px;
      font-size: 11px;
      color: #888;
      font-family: 'Courier New', monospace;
    }
    
    .secret-stamp {
      position: absolute;
      top: 20px;
      right: -10px;
      width: 80px;
      height: 80px;
      background: rgba(255, 0, 0, 0.1);
      border: 3px solid rgba(255, 0, 0, 0.6);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: rotate(15deg);
      font-size: 12px;
      color: rgba(255, 0, 0, 0.8);
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.7;
    }
    
    .secret-stamp::before {
      content: 'SECRET';
    }
    
    .heart-sticker {
      position: absolute;
      bottom: 60px;
      left: 10px;
      font-size: 20px;
      opacity: 0.8;
      transform: rotate(-10deg);
    }
    
    .tape-strip {
      position: absolute;
      width: 60px;
      height: 20px;
      background: rgba(255, 255, 200, 0.7);
      top: -10px;
      left: 50%;
      transform: translateX(-50%) rotate(2deg);
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    
    .tape-strip::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 5px,
          rgba(0, 0, 0, 0.03) 5px,
          rgba(0, 0, 0, 0.03) 10px
        );
    }
    
    .corner-fold {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, #fff 0%, #e8e8e8 100%);
      box-shadow: -2px -2px 5px rgba(0, 0, 0, 0.1);
    }
    
    .corner-fold::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, transparent 50%, #d0d0d0 50%);
    }
    
    .handwritten-note {
      position: absolute;
      bottom: -30px;
      left: 20px;
      font-size: 12px;
      color: #666;
      font-style: italic;
      transform: rotate(-3deg);
      white-space: nowrap;
    }
    
    .photo-meta {
      position: absolute;
      top: 5px;
      left: 5px;
      font-size: 10px;
      color: rgba(0, 0, 0, 0.4);
      font-family: 'Courier New', monospace;
    }
    
    @keyframes subtle-shake {
      0%, 100% { transform: rotate(-2deg) translateY(0); }
      50% { transform: rotate(-1.5deg) translateY(-2px); }
    }
    
    .photo-frame:hover {
      animation: subtle-shake 3s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="photo-container">
    <div class="photo-frame">
      <div class="tape-strip"></div>
      <div class="secret-stamp"></div>
      
      <div class="photo-inner">
        <div class="photo-placeholder">
          <div class="photo-placeholder-icon">📷</div>
          <div class="photo-placeholder-text">{{photoDescription}}</div>
        </div>
        <div class="vignette-overlay"></div>
        <div class="focus-blur"></div>
        <div class="photo-meta">{{cameraInfo}}</div>
      </div>
      
      <div class="heart-sticker">💕</div>
      <div class="photo-caption">{{caption}}</div>
      <div class="photo-date">{{date}}</div>
      <div class="corner-fold"></div>
      <div class="handwritten-note">{{note}}</div>
    </div>
  </div>
</body>
</html>
