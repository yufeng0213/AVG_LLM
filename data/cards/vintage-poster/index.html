<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>复古海报</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2c1810 0%, #3d2314 100%);
      font-family: 'STKaiti', 'KaiTi', '楷体', serif;
      padding: 20px;
    }
    
    .poster-container {
      position: relative;
      width: 100%;
      max-width: 380px;
    }
    
    .poster-card {
      position: relative;
      background: linear-gradient(180deg, #f5e6c8 0%, #e8d4a8 50%, #f0ddb5 100%);
      padding: 30px 25px;
      box-shadow: 
        0 15px 50px rgba(0, 0, 0, 0.4),
        inset 0 0 20px rgba(139, 90, 43, 0.1);
    }
    
    .paper-aged {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 10% 10%, rgba(139, 90, 43, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 90%, rgba(139, 90, 43, 0.05) 0%, transparent 40%);
      pointer-events: none;
    }
    
    .poster-border {
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;
      border: 2px solid rgba(139, 90, 43, 0.4);
    }
    
    .poster-header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 3px double rgba(139, 90, 43, 0.5);
    }
    
    .poster-title {
      font-size: 22px;
      color: #c41e3a;
      letter-spacing: 4px;
      margin-bottom: 8px;
      text-shadow: 1px 1px 0 rgba(139, 90, 43, 0.2);
    }
    
    .poster-subtitle {
      font-size: 14px;
      color: #5a4a3a;
      letter-spacing: 2px;
    }
    
    .poster-content {
      color: #2c1810;
      font-size: 13px;
      line-height: 1.8;
      text-align: center;
      margin-bottom: 20px;
    }
    
    .poster-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      padding: 10px;
      background: rgba(139, 90, 43, 0.1);
      border-top: 1px solid rgba(139, 90, 43, 0.3);
    }
    
    .footer-item {
      font-size: 11px;
      color: #5a4a3a;
    }
    
    .type-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 5px 10px;
      background: #c41e3a;
      color: #fff;
      font-size: 10px;
      letter-spacing: 2px;
      transform: rotate(3deg);
    }
    
    .corner-decoration {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 1px solid rgba(139, 90, 43, 0.4);
    }
    
    .corner-decoration.top-left { top: 0; left: 0; border-right: none; border-bottom: none; }
    .corner-decoration.top-right { top: 0; right: 0; border-left: none; border-bottom: none; }
    .corner-decoration.bottom-left { bottom: 0; left: 0; border-right: none; border-top: none; }
    .corner-decoration.bottom-right { bottom: 0; right: 0; border-left: none; border-top: none; }
    
    .star-decoration {
      position: absolute;
      bottom: 15px;
      left: 15px;
      font-size: 14px;
      color: rgba(139, 90, 43, 0.3);
    }
  </style>
</head>
<body>
  <div class="poster-container">
    <div class="poster-card">
      <div class="paper-aged"></div>
      <div class="poster-border"></div>
      <div class="type-badge">{{eventType}}</div>
      <div class="corner-decoration top-left"></div>
      <div class="corner-decoration top-right"></div>
      <div class="corner-decoration bottom-left"></div>
      <div class="corner-decoration bottom-right"></div>
      <div class="star-decoration">★</div>
      
      <div class="poster-header">
        <div class="poster-title">{{posterTitle}}</div>
        <div class="poster-subtitle">{{subtitle}}</div>
      </div>
      
      <div class="poster-content">
        {{content}}
      </div>
      
      <div class="poster-footer">
        <div class="footer-item">{{location}}</div>
        <div class="footer-item">{{date}}</div>
      </div>
    </div>
  </div>
</body>
</html>
