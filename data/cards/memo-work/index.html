<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工作备忘录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      padding: 20px;
    }
    
    .memo-container {
      position: relative;
      width: 100%;
      max-width: 380px;
    }
    
    .memo-card {
      position: relative;
      background: #fff;
      padding: 25px 20px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      border-radius: 3px;
    }
    
    .header-stripe {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: #3498db;
    }
    
    .priority-indicator {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 5px 10px;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1px;
      border-radius: 2px;
    }
    
    .priority-normal { background: #f5f5f5; color: #666; border: 1px solid #ddd; }
    .priority-important { background: #f39c12; color: #fff; }
    .priority-urgent { background: #e74c3c; color: #fff; animation: urgent-pulse 1s ease-in-out infinite; }
    
    @keyframes urgent-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    .memo-header {
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }
    
    .memo-title {
      font-size: 16px;
      color: #1a1a1a;
      font-weight: 500;
      margin-bottom: 10px;
    }
    
    .memo-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #888;
    }
    
    .memo-content {
      color: #333;
      font-size: 13px;
      line-height: 1.8;
      margin-bottom: 15px;
    }
    
    .deadline-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: rgba(52, 152, 219, 0.05);
      border: 1px dashed rgba(52, 152, 219, 0.3);
    }
    
    .deadline-label {
      font-size: 11px;
      color: #888;
    }
    
    .deadline-value {
      font-size: 12px;
      color: #3498db;
      font-weight: 500;
    }
    
    .footer-section {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px solid #eee;
    }
    
    .footer-item {
      font-size: 10px;
      color: #999;
    }
    
    .clip-decoration {
      position: absolute;
      top: -8px;
      left: 20px;
      width: 30px;
      height: 20px;
      background: #888;
      border-radius: 2px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }
    
    .clip-decoration::before {
      content: '';
      position: absolute;
      top: 5px;
      left: 5px;
      right: 5px;
      height: 8px;
      background: #666;
      border-radius: 1px;
    }
  </style>
</head>
<body>
  <div class="memo-container">
    <div class="memo-card">
      <div class="header-stripe"></div>
      <div class="clip-decoration"></div>
      <div class="priority-indicator priority-normal">{{priority}}</div>
      
      <div class="memo-header">
        <div class="memo-title">{{memoTitle}}</div>
        <div class="memo-meta">
          <span>来自: {{from}}</span>
          <span>致: {{to}}</span>
        </div>
      </div>
      
      <div class="memo-content">
        {{content}}
      </div>
      
      <div class="deadline-section">
        <span class="deadline-label">截止日期</span>
        <span class="deadline-value">{{deadline}}</span>
      </div>
      
      <div class="footer-section">
        <div class="footer-item">{{date}}</div>
        <div class="footer-item">工作备忘录</div>
      </div>
    </div>
  </div>
</body>
</html>
