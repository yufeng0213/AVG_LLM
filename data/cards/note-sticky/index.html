<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>便签</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
      font-family: 'Comic Sans MS', 'Segoe UI', sans-serif;
      padding: 20px;
    }
    
    .note-container {
      position: relative;
      width: 100%;
      max-width: 280px;
    }
    
    .sticky-note {
      position: relative;
      background: linear-gradient(180deg, #fff740 0%, #ffe135 100%);
      padding: 25px 20px;
      min-height: 200px;
      box-shadow: 
        0 10px 30px rgba(0, 0, 0, 0.15),
        0 5px 15px rgba(0, 0, 0, 0.1);
      transform: rotate(-3deg);
    }
    
    .note-shadow {
      position: absolute;
      bottom: -10px;
      left: 5px;
      right: 5px;
      height: 20px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.1) 0%, transparent 100%);
      filter: blur(5px);
      transform: rotate(3deg);
    }
    
    .sticky-strip {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 25px;
      background: linear-gradient(180deg, #ffd700 0%, #ffb800 100%);
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    
    .sticky-strip::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 10px,
          rgba(255, 255, 255, 0.1) 10px,
          rgba(255, 255, 255, 0.1) 20px
        );
    }
    
    .note-content {
      font-size: 14px;
      line-height: 22px;
      color: #333;
      position: relative;
      z-index: 1;
      margin-top: 10px;
    }
    
    .note-content p {
      margin-bottom: 10px;
    }
    
    .note-title {
      font-size: 16px;
      font-weight: bold;
      color: #222;
      margin-bottom: 15px;
      text-decoration: underline;
      text-decoration-color: rgba(0, 0, 0, 0.2);
    }
    
    .note-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    
    .checkbox {
      width: 16px;
      height: 16px;
      border: 2px solid #333;
      border-radius: 3px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 12px;
    }
    
    .checkbox.checked {
      background: #333;
      color: #fff740;
    }
    
    .note-footer {
      margin-top: 20px;
      text-align: right;
      font-size: 12px;
      color: #666;
      font-style: italic;
    }
    
    .pin-decoration {
      position: absolute;
      top: -8px;
      right: 20px;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle at 30% 30%, #e74c3c 0%, #c0392b 100%);
      border-radius: 50%;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
    }
    
    .pin-decoration::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 6px;
      height: 6px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
    }
    
    .fold-corner {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #ffe135 0%, #ffd700 100%);
      box-shadow: -1px -1px 3px rgba(0, 0, 0, 0.1);
    }
    
    .fold-corner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, transparent 50%, rgba(0, 0, 0, 0.05) 50%);
    }
    
    .scribble-decoration {
      position: absolute;
      bottom: 15px;
      left: 15px;
      font-size: 20px;
      opacity: 0.3;
    }
    
    @keyframes wiggle {
      0%, 100% { transform: rotate(-3deg); }
      25% { transform: rotate(-2deg); }
      75% { transform: rotate(-4deg); }
    }
    
    .sticky-note:hover {
      animation: wiggle 2s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="note-container">
    <div class="sticky-note">
      <div class="sticky-strip"></div>
      <div class="pin-decoration"></div>
      <div class="note-shadow"></div>
      
      <div class="note-title">{{title}}</div>
      
      <div class="note-content">
        {{content}}
      </div>
      
      <div class="note-footer">
        {{footer}}
      </div>
      
      <div class="fold-corner"></div>
      <div class="scribble-decoration">📝</div>
    </div>
  </div>
</body>
</html>
