<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>梦境碎片</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      font-family: 'Georgia', serif;
      padding: 20px;
      overflow: hidden;
    }
    
    .dream-container {
      position: relative;
      width: 100%;
      max-width: 380px;
      perspective: 1000px;
    }
    
    .dream-card {
      position: relative;
      background: linear-gradient(135deg, 
        rgba(15, 52, 96, 0.9) 0%, 
        rgba(26, 26, 46, 0.95) 50%, 
        rgba(233, 69, 96, 0.1) 100%);
      border: 1px solid rgba(233, 69, 96, 0.3);
      padding: 35px 30px;
      box-shadow: 
        0 0 60px rgba(233, 69, 96, 0.2),
        0 0 100px rgba(15, 52, 96, 0.3),
        inset 0 0 50px rgba(0, 0, 0, 0.3);
      transform-style: preserve-3d;
      animation: dream-float 6s ease-in-out infinite;
    }
    
    @keyframes dream-float {
      0%, 100% { transform: rotateY(0deg) rotateX(0deg); }
      25% { transform: rotateY(1deg) rotateX(0.5deg); }
      50% { transform: rotateY(-1deg) rotateX(-0.5deg); }
      75% { transform: rotateY(0.5deg) rotateX(1deg); }
    }
    
    .dream-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 30% 20%, rgba(233, 69, 96, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(15, 52, 96, 0.2) 0%, transparent 50%);
      pointer-events: none;
      animation: color-shift 8s ease-in-out infinite;
    }
    
    @keyframes color-shift {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    .melting-clock {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 40px;
      height: 40px;
      border: 2px solid rgba(233, 69, 96, 0.5);
      border-radius: 50%;
      animation: melt 4s ease-in-out infinite;
    }
    
    @keyframes melt {
      0%, 100% { transform: scale(1) rotate(0deg); border-radius: 50%; }
      50% { transform: scale(1.1, 0.8) rotate(10deg); border-radius: 40% 60% 60% 40%; }
    }
    
    .melting-clock::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 2px;
      height: 12px;
      background: rgba(233, 69, 96, 0.7);
      transform-origin: bottom center;
      transform: translateX(-50%);
      animation: clock-hand 10s linear infinite;
    }
    
    @keyframes clock-hand {
      from { transform: translateX(-50%) rotate(0deg); }
      to { transform: translateX(-50%) rotate(360deg); }
    }
    
    .dream-header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(233, 69, 96, 0.3);
    }
    
    .dream-title {
      font-size: 20px;
      color: #e94560;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(233, 69, 96, 0.5);
      margin-bottom: 5px;
    }
    
    .dream-date {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 1px;
    }
    
    .dream-content {
      color: rgba(255, 255, 255, 0.85);
      font-size: 14px;
      line-height: 1.9;
      text-align: justify;
      position: relative;
      z-index: 1;
    }
    
    .dream-content::first-letter {
      font-size: 28px;
      float: left;
      color: #e94560;
      margin-right: 8px;
      line-height: 1;
    }
    
    .dream-symbols {
      margin-top: 20px;
      padding: 12px;
      background: rgba(233, 69, 96, 0.1);
      border-left: 2px solid #e94560;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }
    
    .dream-symbols::before {
      content: '◈ 符号解读';
      display: block;
      font-size: 11px;
      color: #e94560;
      margin-bottom: 5px;
      letter-spacing: 2px;
    }
    
    .floating-elements {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      overflow: hidden;
    }
    
    .float-element {
      position: absolute;
      opacity: 0.15;
      animation: float-up 8s ease-in-out infinite;
    }
    
    .float-element:nth-child(1) {
      top: 20%;
      left: 10%;
      font-size: 20px;
      animation-delay: 0s;
    }
    
    .float-element:nth-child(2) {
      top: 60%;
      right: 15%;
      font-size: 16px;
      animation-delay: 2s;
    }
    
    .float-element:nth-child(3) {
      bottom: 20%;
      left: 20%;
      font-size: 18px;
      animation-delay: 4s;
    }
    
    @keyframes float-up {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.15; }
      50% { transform: translateY(-20px) rotate(180deg); opacity: 0.25; }
    }
    
    .glitch-text {
      position: relative;
    }
    
    .glitch-text::before,
    .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    .glitch-text::before {
      color: #0ff;
      animation: glitch-1 3s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
    }
    
    .glitch-text::after {
      color: #f0f;
      animation: glitch-2 3s infinite;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
    }
    
    @keyframes glitch-1 {
      0%, 90%, 100% { transform: translateX(0); }
      92% { transform: translateX(-2px); }
      94% { transform: translateX(2px); }
    }
    
    @keyframes glitch-2 {
      0%, 90%, 100% { transform: translateX(0); }
      91% { transform: translateX(2px); }
      93% { transform: translateX(-2px); }
    }
  </style>
</head>
<body>
  <div class="dream-container">
    <div class="dream-card">
      <div class="dream-overlay"></div>
      <div class="melting-clock"></div>
      <div class="floating-elements">
        <div class="float-element">◯</div>
        <div class="float-element">△</div>
        <div class="float-element">◇</div>
      </div>
      
      <div class="dream-header">
        <div class="dream-title glitch-text" data-text="{{dreamTitle}}">{{dreamTitle}}</div>
        <div class="dream-date">{{dreamDate}}</div>
      </div>
      
      <div class="dream-content">
        {{dreamContent}}
      </div>
      
      <div class="dream-symbols">
        {{symbols}}
      </div>
    </div>
  </div>
</body>
</html>
