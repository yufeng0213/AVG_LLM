<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>侦探档案</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 50%, #1a1a1a 100%);
      font-family: 'Courier New', monospace;
      padding: 20px;
    }
    
    .noir-container {
      position: relative;
      width: 100%;
      max-width: 400px;
    }
    
    .noir-card {
      position: relative;
      background: linear-gradient(180deg, #f5f5f0 0%, #e8e8e0 50%, #f0f0e8 100%);
      padding: 30px 25px;
      box-shadow: 
        0 15px 50px rgba(0, 0, 0, 0.4),
        inset 0 0 20px rgba(0, 0, 0, 0.1);
    }
    
    .paper-aged {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(139, 90, 43, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(139, 90, 43, 0.08) 0%, transparent 50%);
      pointer-events: none;
    }
    
    .coffee-stain {
      position: absolute;
      top: 20px;
      right: 30px;
      width: 40px;
      height: 40px;
      background: radial-gradient(circle, rgba(139, 90, 43, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      opacity: 0.5;
    }
    
    .status-stamp {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 5px 10px;
      background: #8b0000;
      color: #fff;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 2px;
      transform: rotate(-3deg);
      box-shadow: 0 2px 5px rgba(139, 0, 0, 0.3);
    }
    
    .noir-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #333;
    }
    
    .case-number {
      font-size: 10px;
      color: #666;
      letter-spacing: 1px;
    }
    
    .detective-info {
      font-size: 10px;
      color: #888;
    }
    
    .noir-title {
      font-size: 16px;
      color: #1a1a1a;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px dashed #666;
      letter-spacing: 1px;
    }
    
    .noir-content {
      color: #333;
      font-size: 12px;
      line-height: 1.8;
      margin-bottom: 15px;
    }
    
    .noir-content::first-letter {
      font-size: 24px;
      font-weight: bold;
      color: #1a1a1a;
    }
    
    .clues-section {
      margin-top: 15px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.05);
      border-left: 3px solid #333;
    }
    
    .clues-section::before {
      content: '线索记录';
      display: block;
      font-size: 10px;
      color: #666;
      margin-bottom: 5px;
      letter-spacing: 2px;
    }
    
    .clues-text {
      font-size: 11px;
      color: #555;
    }
    
    .footer-stamp {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px solid #ccc;
    }
    
    .stamp-item {
      font-size: 10px;
      color: #888;
    }
    
    .magnifier-decoration {
      position: absolute;
      bottom: 15px;
      left: 15px;
      width: 25px;
      height: 25px;
      opacity: 0.2;
    }
    
    .magnifier-decoration::before {
      content: '🔍';
      font-size: 18px;
    }
    
    .corner-fold {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, transparent 50%, #d0d0c8 50%);
      box-shadow: -2px -2px 5px rgba(0, 0, 0, 0.1);
    }
    
    .typewriter-effect {
      position: relative;
    }
    
    .typewriter-effect::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 2px;
      height: 12px;
      background: #1a1a1a;
      animation: typewriter-cursor 1s step-end infinite;
    }
    
    @keyframes typewriter-cursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="noir-container">
    <div class="noir-card">
      <div class="paper-aged"></div>
      <div class="coffee-stain"></div>
      <div class="status-stamp">{{status}}</div>
      <div class="magnifier-decoration"></div>
      <div class="corner-fold"></div>
      
      <div class="noir-header">
        <div class="case-number">案件编号: {{caseNumber}}</div>
        <div class="detective-info">侦探: {{detective}}</div>
      </div>
      
      <div class="noir-title">{{title}}</div>
      
      <div class="noir-content typewriter-effect">
        {{content}}
      </div>
      
      <div class="clues-section">
        <div class="clues-text">待补充线索...</div>
      </div>
      
      <div class="footer-stamp">
        <div class="stamp-item">日期: {{date}}</div>
        <div class="stamp-item">机密档案</div>
      </div>
    </div>
  </div>
</body>
</html>
