<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乐谱手稿</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
      font-family: 'Georgia', serif;
      padding: 20px;
    }
    
    .music-container {
      position: relative;
      width: 100%;
      max-width: 380px;
    }
    
    .music-card {
      position: relative;
      background: #fff;
      padding: 35px 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      border-radius: 3px;
    }
    
    .staff-lines {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 15px,
          rgba(0, 0, 0, 0.03) 15px,
          rgba(0, 0, 0, 0.03) 16px
        );
      pointer-events: none;
    }
    
    .instrument-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 5px 10px;
      background: rgba(196, 30, 58, 0.1);
      border: 1px solid #c41e3a;
      color: #c41e3a;
      font-size: 10px;
      letter-spacing: 1px;
    }
    
    .music-header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid rgba(0, 0, 0, 0.1);
    }
    
    .piece-title {
      font-size: 18px;
      color: #1a1a1a;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    
    .composer-name {
      font-size: 12px;
      color: #666;
      letter-spacing: 1px;
    }
    
    .tempo-info {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 15px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.03);
    }
    
    .tempo-item {
      font-size: 11px;
      color: #888;
    }
    
    .music-content {
      color: #333;
      font-size: 13px;
      line-height: 2;
      text-align: justify;
      margin-bottom: 20px;
    }
    
    .music-content::first-letter {
      font-size: 24px;
      color: #c41e3a;
    }
    
    .note-decoration {
      position: absolute;
      bottom: 15px;
      left: 15px;
      width: 30px;
      height: 30px;
      opacity: 0.2;
    }
    
    .note-decoration::before {
      content: '♪';
      font-size: 24px;
      color: #1a1a1a;
    }
    
    .treble-clef {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 28px;
      color: rgba(0, 0, 0, 0.1);
    }
    
    .corner-decoration {
      position: absolute;
      width: 15px;
      height: 15px;
      border: 1px solid rgba(0, 0, 0, 0.1);
    }
    
    .corner-decoration.top-left { top: 5px; left: 5px; border-right: none; border-bottom: none; }
    .corner-decoration.top-right { top: 5px; right: 5px; border-left: none; border-bottom: none; }
    .corner-decoration.bottom-left { bottom: 5px; left: 5px; border-right: none; border-top: none; }
    .corner-decoration.bottom-right { bottom: 5px; right: 5px; border-left: none; border-top: none; }
    
    .date-stamp {
      position: absolute;
      bottom: 15px;
      right: 15px;
      font-size: 10px;
      color: #999;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="music-container">
    <div class="music-card">
      <div class="staff-lines"></div>
      <div class="treble-clef">𝄞</div>
      <div class="instrument-badge">{{instrument}}</div>
      <div class="note-decoration"></div>
      <div class="corner-decoration top-left"></div>
      <div class="corner-decoration top-right"></div>
      <div class="corner-decoration bottom-left"></div>
      <div class="corner-decoration bottom-right"></div>
      
      <div class="music-header">
        <div class="piece-title">{{pieceTitle}}</div>
        <div class="composer-name">{{composer}}</div>
      </div>
      
      <div class="tempo-info">
        <div class="tempo-item">节拍: {{tempo}}</div>
        <div class="tempo-item">调式: C大调</div>
      </div>
      
      <div class="music-content">
        {{content}}
      </div>
      
      <div class="date-stamp">{{date}}</div>
    </div>
  </div>
</body>
</html>
