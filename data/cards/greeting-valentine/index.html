<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情人节贺卡</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
      font-family: 'Georgia', 'Times New Roman', serif;
      padding: 20px;
      overflow: hidden;
    }
    
    .card-container {
      position: relative;
      width: 100%;
      max-width: 400px;
    }
    
    .card {
      position: relative;
      background: linear-gradient(145deg, #fff 0%, #fff5f5 100%);
      border-radius: 20px;
      padding: 45px 40px;
      box-shadow: 
        0 25px 80px rgba(255, 107, 107, 0.3),
        0 10px 30px rgba(255, 154, 158, 0.2);
      overflow: hidden;
    }
    
    .heart {
      position: absolute;
      font-size: 20px;
      animation: heartbeat 1.5s ease-in-out infinite;
      opacity: 0.6;
    }
    
    .heart:nth-child(1) { top: 15px; left: 20px; animation-delay: 0s; }
    .heart:nth-child(2) { top: 25px; right: 25px; animation-delay: 0.3s; font-size: 16px; }
    .heart:nth-child(3) { top: 50px; left: 50%; animation-delay: 0.6s; font-size: 14px; }
    .heart:nth-child(4) { bottom: 80px; left: 15px; animation-delay: 0.9s; font-size: 18px; }
    .heart:nth-child(5) { bottom: 60px; right: 20px; animation-delay: 1.2s; font-size: 15px; }
    
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    
    .floating-heart {
      position: absolute;
      font-size: 16px;
      animation: float-up 4s ease-in-out infinite;
      opacity: 0;
    }
    
    .floating-heart:nth-child(6) { left: 10%; animation-delay: 0s; }
    .floating-heart:nth-child(7) { left: 30%; animation-delay: 1s; }
    .floating-heart:nth-child(8) { left: 50%; animation-delay: 2s; }
    .floating-heart:nth-child(9) { left: 70%; animation-delay: 3s; }
    .floating-heart:nth-child(10) { left: 90%; animation-delay: 4s; }
    
    @keyframes float-up {
      0% { 
        bottom: -20px; 
        opacity: 0;
        transform: translateX(0) rotate(0deg);
      }
      50% { 
        opacity: 0.8;
      }
      100% { 
        bottom: 100%; 
        opacity: 0;
        transform: translateX(20px) rotate(20deg);
      }
    }
    
    .main-heart {
      text-align: center;
      font-size: 60px;
      margin-bottom: 15px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      25% { transform: scale(1.1); }
      50% { transform: scale(1); }
      75% { transform: scale(1.1); }
    }
    
    .card-title {
      text-align: center;
      font-size: 28px;
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 50%, #ff8e8e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      font-weight: bold;
      letter-spacing: 3px;
    }
    
    .recipient-name {
      text-align: center;
      font-size: 20px;
      color: #ff6b6b;
      margin-bottom: 20px;
      font-style: italic;
    }
    
    .card-content {
      font-size: 15px;
      line-height: 28px;
      color: #5a4a4a;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    
    .card-content p {
      margin-bottom: 12px;
    }
    
    .love-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 25px 0;
      gap: 10px;
    }
    
    .love-divider span {
      font-size: 14px;
    }
    
    .love-divider::before,
    .love-divider::after {
      content: '';
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #ff6b6b, transparent);
    }
    
    .sender-info {
      text-align: right;
      margin-top: 25px;
      color: #a08080;
      font-style: italic;
    }
    
    .sender-info .sender {
      font-size: 16px;
      color: #ff6b6b;
      font-weight: bold;
      font-style: normal;
    }
    
    .rose-petals {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      opacity: 0.3;
      letter-spacing: 5px;
    }
    
    .ribbon {
      position: absolute;
      top: -10px;
      right: -10px;
      width: 80px;
      height: 80px;
      overflow: hidden;
    }
    
    .ribbon::before {
      content: 'LOVE';
      position: absolute;
      top: 18px;
      right: -25px;
      background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
      color: white;
      font-size: 10px;
      font-weight: bold;
      padding: 5px 30px;
      transform: rotate(45deg);
      letter-spacing: 2px;
    }
    
    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #ff6b6b;
      border-radius: 50%;
      animation: sparkle 2s ease-in-out infinite;
    }
    
    .sparkle:nth-child(11) { top: 100px; left: 40px; }
    .sparkle:nth-child(12) { top: 150px; right: 50px; animation-delay: 0.5s; }
    .sparkle:nth-child(13) { bottom: 120px; left: 60px; animation-delay: 1s; }
    .sparkle:nth-child(14) { bottom: 160px; right: 40px; animation-delay: 1.5s; }
    
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1.5); }
    }
    
    .lace-border {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border: 2px dashed rgba(255, 107, 107, 0.2);
      border-radius: 20px;
      margin: 8px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="card-container">
    <div class="card">
      <div class="heart">💕</div>
      <div class="heart">💗</div>
      <div class="heart">💖</div>
      <div class="heart">💕</div>
      <div class="heart">💗</div>
      <div class="floating-heart">💗</div>
      <div class="floating-heart">💖</div>
      <div class="floating-heart">💕</div>
      <div class="floating-heart">💗</div>
      <div class="floating-heart">💖</div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      
      <div class="ribbon"></div>
      <div class="lace-border"></div>
      
      <div class="main-heart">💝</div>
      
      <h1 class="card-title">情人节快乐</h1>
      
      <div class="recipient-name">亲爱的 {{recipient}}</div>
      
      <div class="card-content">
        {{content}}
      </div>
      
      <div class="love-divider">
        <span>🌹</span>
        <span>Forever</span>
        <span>Love</span>
        <span>🌹</span>
      </div>
      
      <div class="sender-info">
        <div>永远爱你</div>
        <div class="sender">{{sender}}</div>
      </div>
      
      <div class="rose-petals">🌹 🌹 🌹</div>
    </div>
  </div>
</body>
</html>
