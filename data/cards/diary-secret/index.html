<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>秘密日记</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
      font-family: 'Georgia', 'Times New Roman', serif;
      padding: 20px;
    }
    
    .diary-container {
      position: relative;
      width: 100%;
      max-width: 420px;
    }
    
    .diary-book {
      position: relative;
      background: linear-gradient(145deg, #8b4513 0%, #654321 100%);
      padding: 8px;
      border-radius: 3px 8px 8px 3px;
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.4),
        0 8px 25px rgba(0, 0, 0, 0.3),
        inset 0 2px 0 rgba(255, 255, 255, 0.1);
    }
    
    .diary-spine {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 8px;
      background: linear-gradient(180deg, #654321 0%, #4a3728 50%, #654321 100%);
      border-radius: 3px 0 0 3px;
    }
    
    .diary-spine::before {
      content: '';
      position: absolute;
      top: 20px;
      bottom: 20px;
      left: 2px;
      width: 2px;
      background: repeating-linear-gradient(
        180deg,
        #8b4513 0px,
        #8b4513 10px,
        #654321 10px,
        #654321 20px
      );
    }
    
    .diary-page {
      position: relative;
      background: linear-gradient(180deg, #fffef5 0%, #f5f0e0 100%);
      padding: 35px 30px;
      border-radius: 0 5px 5px 0;
      min-height: 400px;
      box-shadow: inset 0 0 20px rgba(139, 69, 19, 0.1);
    }
    
    .page-lines {
      position: absolute;
      top: 60px;
      left: 30px;
      right: 30px;
      bottom: 30px;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 27px,
        rgba(200, 180, 160, 0.4) 27px,
        rgba(200, 180, 160, 0.4) 28px
      );
      pointer-events: none;
    }
    
    .page-margin {
      position: absolute;
      top: 60px;
      left: 60px;
      bottom: 30px;
      width: 1px;
      background: rgba(255, 100, 100, 0.3);
      pointer-events: none;
    }
    
    .diary-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px dashed rgba(139, 69, 19, 0.3);
    }
    
    .diary-date {
      font-size: 14px;
      color: #8b4513;
      font-style: italic;
    }
    
    .diary-weather {
      font-size: 16px;
    }
    
    .secret-lock {
      position: absolute;
      top: 15px;
      right: 15px;
      font-size: 20px;
      opacity: 0.6;
    }
    
    .diary-title {
      font-size: 18px;
      color: #5d4e37;
      margin-bottom: 20px;
      text-align: center;
      font-weight: normal;
      letter-spacing: 2px;
    }
    
    .diary-content {
      font-size: 14px;
      line-height: 28px;
      color: #3d3d3d;
      position: relative;
      z-index: 1;
    }
    
    .diary-content p {
      text-indent: 2em;
      margin-bottom: 15px;
    }
    
    .secret-text {
      background: rgba(255, 200, 200, 0.2);
      padding: 2px 4px;
      border-radius: 2px;
    }
    
    .heart-margin {
      position: absolute;
      left: 35px;
      font-size: 10px;
      color: rgba(255, 100, 100, 0.5);
      opacity: 0.6;
    }
    
    .heart-margin:nth-child(1) { top: 90px; }
    .heart-margin:nth-child(2) { top: 118px; }
    .heart-margin:nth-child(3) { top: 146px; }
    
    .diary-footer {
      margin-top: 30px;
      text-align: right;
      font-size: 13px;
      color: #8b7355;
      font-style: italic;
    }
    
    .page-number {
      position: absolute;
      bottom: 10px;
      right: 20px;
      font-size: 12px;
      color: #a09080;
    }
    
    .bookmark {
      position: absolute;
      top: -5px;
      right: 30px;
      width: 25px;
      height: 60px;
      background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%);
      border-radius: 0 0 3px 3px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }
    
    .bookmark::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 15px;
      background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.1) 100%);
      clip-path: polygon(0 0, 50% 100%, 100% 0);
    }
    
    .worn-edge {
      position: absolute;
      top: 0;
      right: 0;
      width: 30px;
      height: 100%;
      background: linear-gradient(90deg, transparent 0%, rgba(139, 69, 19, 0.1) 100%);
      pointer-events: none;
    }
    
    .coffee-stain {
      position: absolute;
      bottom: 80px;
      right: 40px;
      width: 40px;
      height: 40px;
      background: radial-gradient(circle, rgba(139, 90, 43, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      opacity: 0.5;
    }
    
    @keyframes page-flip {
      0%, 100% { transform: rotateY(0deg); }
      50% { transform: rotateY(-5deg); }
    }
    
    .diary-book:hover .diary-page {
      animation: page-flip 3s ease-in-out infinite;
      transform-origin: left center;
    }
  </style>
</head>
<body>
  <div class="diary-container">
    <div class="diary-book">
      <div class="diary-spine"></div>
      <div class="bookmark"></div>
      
      <div class="diary-page">
        <div class="page-lines"></div>
        <div class="page-margin"></div>
        <div class="worn-edge"></div>
        <div class="coffee-stain"></div>
        <div class="secret-lock">🔒</div>
        
        <div class="diary-header">
          <div class="diary-date">{{date}}</div>
          <div class="diary-weather">{{weather}}</div>
        </div>
        
        <h2 class="diary-title">{{title}}</h2>
        
        <div class="diary-content">
          {{content}}
        </div>
        
        <div class="diary-footer">
          {{footer}}
        </div>
        
        <div class="page-number">{{pageNumber}}</div>
      </div>
    </div>
  </div>
</body>
</html>
