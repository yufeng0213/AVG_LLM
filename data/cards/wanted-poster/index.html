<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通缉令</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2c1810 0%, #3d2314 100%);
      font-family: 'Impact', 'Arial Black', sans-serif;
      padding: 20px;
    }
    
    .wanted-container {
      position: relative;
      width: 100%;
      max-width: 380px;
    }
    
    .wanted-card {
      position: relative;
      background: linear-gradient(180deg, #f5e6c8 0%, #e8d4a8 50%, #f0ddb5 100%);
      padding: 30px 25px;
      box-shadow: 
        0 15px 50px rgba(0, 0, 0, 0.4),
        inset 0 0 30px rgba(139, 90, 43, 0.1);
    }
    
    .paper-aged {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 10% 10%, rgba(139, 90, 43, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 90%, rgba(139, 90, 43, 0.08) 0%, transparent 40%);
      pointer-events: none;
    }
    
    .wanted-header {
      text-align: center;
      margin-bottom: 15px;
    }
    
    .wanted-title {
      font-size: 36px;
      color: #c41e3a;
      letter-spacing: 8px;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.2);
    }
    
    .danger-badge {
      display: inline-block;
      padding: 5px 15px;
      background: #c41e3a;
      color: #fff;
      font-size: 12px;
      letter-spacing: 2px;
      margin-top: 10px;
    }
    
    .criminal-section {
      text-align: center;
      margin-bottom: 15px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.05);
      border: 2px solid rgba(139, 90, 43, 0.3);
    }
    
    .criminal-name {
      font-size: 20px;
      color: #2c1810;
      letter-spacing: 3px;
      margin-bottom: 5px;
    }
    
    .bounty-amount {
      font-size: 14px;
      color: #8b4513;
      letter-spacing: 1px;
    }
    
    .info-section {
      margin-bottom: 15px;
    }
    
    .info-row {
      display: flex;
      margin-bottom: 8px;
      font-size: 12px;
    }
    
    .info-label {
      width: 80px;
      color: #5a4a3a;
      font-weight: bold;
    }
    
    .info-value {
      flex: 1;
      color: #2c1810;
    }
    
    .crimes-section {
      margin-top: 15px;
      padding: 10px;
      background: rgba(196, 30, 58, 0.1);
      border-left: 3px solid #c41e3a;
    }
    
    .crimes-title {
      font-size: 11px;
      color: #c41e3a;
      margin-bottom: 5px;
      letter-spacing: 2px;
    }
    
    .crimes-content {
      font-size: 11px;
      color: #2c1810;
      line-height: 1.6;
    }
    
    .footer-section {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      padding-top: 10px;
      border-top: 2px solid rgba(139, 90, 43, 0.3);
    }
    
    .footer-item {
      font-size: 10px;
      color: #5a4a3a;
    }
    
    .star-decoration {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 14px;
      color: rgba(196, 30, 58, 0.3);
    }
    
    .star-decoration.right {
      left: auto;
      right: 10px;
    }
    
    .corner-decoration {
      position: absolute;
      width: 15px;
      height: 15px;
      border: 1px solid rgba(139, 90, 43, 0.4);
    }
    
    .corner-decoration.top-left { top: 5px; left: 5px; border-right: none; border-bottom: none; }
    .corner-decoration.top-right { top: 5px; right: 5px; border-left: none; border-bottom: none; }
    .corner-decoration.bottom-left { bottom: 5px; left: 5px; border-right: none; border-top: none; }
    .corner-decoration.bottom-right { bottom: 5px; right: 5px; border-left: none; border-top: none; }
  </style>
</head>
<body>
  <div class="wanted-container">
    <div class="wanted-card">
      <div class="paper-aged"></div>
      <div class="star-decoration">★</div>
      <div class="star-decoration right">★</div>
      <div class="corner-decoration top-left"></div>
      <div class="corner-decoration top-right"></div>
      <div class="corner-decoration bottom-left"></div>
      <div class="corner-decoration bottom-right"></div>
      
      <div class="wanted-header">
        <div class="wanted-title">通缉</div>
        <div class="danger-badge">{{dangerLevel}}</div>
      </div>
      
      <div class="criminal-section">
        <div class="criminal-name">{{criminalName}}</div>
        <div class="bounty-amount">悬赏: {{bounty}}</div>
      </div>
      
      <div class="info-section">
        <div class="info-row">
          <span class="info-label">外貌特征:</span>
          <span class="info-value">{{description}}</span>
        </div>
        <div class="info-row">
          <span class="info-label">最后出现:</span>
          <span class="info-value">{{lastSeen}}</span>
        </div>
      </div>
      
      <div class="crimes-section">
        <div class="crimes-title">罪行</div>
        <div class="crimes-content">{{crimes}}</div>
      </div>
      
      <div class="footer-section">
        <div class="footer-item">{{issuer}}</div>
        <div class="footer-item">有线索者请立即报告</div>
      </div>
    </div>
  </div>
</body>
</html>
