<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仙家玉简</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0a1a2a 0%, #1a2a3a 50%, #0a1a2a 100%);
      font-family: 'STKaiti', 'KaiTi', '楷体', serif;
      padding: 20px;
    }
    
    .jade-container {
      position: relative;
      width: 100%;
      max-width: 380px;
    }
    
    .jade-card {
      position: relative;
      background: linear-gradient(180deg, 
        rgba(0, 212, 170, 0.15) 0%, 
        rgba(240, 248, 255, 0.2) 50%, 
        rgba(0, 212, 170, 0.1) 100%);
      border: 2px solid rgba(0, 212, 170, 0.4);
      padding: 35px 30px;
      box-shadow: 
        0 0 30px rgba(0, 212, 170, 0.3),
        0 0 60px rgba(0, 212, 170, 0.1),
        inset 0 0 30px rgba(0, 212, 170, 0.1);
    }
    
    .jade-glow {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at center, rgba(0, 212, 170, 0.1) 0%, transparent 70%);
      animation: glow-pulse 3s ease-in-out infinite;
      pointer-events: none;
    }
    
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    
    .spirit-particles {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      overflow: hidden;
    }
    
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(0, 212, 170, 0.6);
      border-radius: 50%;
      animation: float-particle 5s ease-in-out infinite;
    }
    
    .particle:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; }
    .particle:nth-child(2) { top: 40%; right: 15%; animation-delay: 1s; }
    .particle:nth-child(3) { bottom: 30%; left: 20%; animation-delay: 2s; }
    .particle:nth-child(4) { top: 60%; right: 10%; animation-delay: 3s; }
    
    @keyframes float-particle {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
      50% { transform: translateY(-20px) scale(1.5); opacity: 1; }
    }
    
    .rune-decoration {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 30px;
      height: 30px;
      opacity: 0.4;
    }
    
    .rune-decoration::before {
      content: '☯';
      font-size: 24px;
      color: #00d4aa;
    }
    
    .realm-badge {
      position: absolute;
      top: 15px;
      left: 15px;
      padding: 5px 10px;
      background: rgba(0, 212, 170, 0.2);
      border: 1px solid rgba(0, 212, 170, 0.5);
      color: #00d4aa;
      font-size: 11px;
      letter-spacing: 2px;
    }
    
    .jade-header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(0, 212, 170, 0.3);
    }
    
    .jade-title {
      font-size: 18px;
      color: #00d4aa;
      letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(0, 212, 170, 0.5);
      margin-bottom: 10px;
    }
    
    .jade-meta {
      font-size: 12px;
      color: rgba(0, 212, 170, 0.7);
      letter-spacing: 1px;
    }
    
    .jade-content {
      color: rgba(240, 248, 255, 0.9);
      font-size: 14px;
      line-height: 2;
      text-align: justify;
      margin-bottom: 20px;
    }
    
    .jade-signature {
      text-align: right;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid rgba(0, 212, 170, 0.2);
    }
    
    .signature-text {
      font-size: 14px;
      color: #00d4aa;
      letter-spacing: 2px;
    }
    
    .cloud-decoration {
      position: absolute;
      bottom: 10px;
      left: 10px;
      width: 40px;
      height: 20px;
      opacity: 0.2;
    }
    
    .cloud-decoration::before {
      content: '☁';
      font-size: 20px;
      color: #00d4aa;
    }
    
    .corner-rune {
      position: absolute;
      width: 15px;
      height: 15px;
      border: 1px solid rgba(0, 212, 170, 0.3);
    }
    
    .corner-rune.top-left { top: 5px; left: 5px; border-right: none; border-bottom: none; }
    .corner-rune.top-right { top: 5px; right: 5px; border-left: none; border-bottom: none; }
    .corner-rune.bottom-left { bottom: 5px; left: 5px; border-right: none; border-top: none; }
    .corner-rune.bottom-right { bottom: 5px; right: 5px; border-left: none; border-top: none; }
  </style>
</head>
<body>
  <div class="jade-container">
    <div class="jade-card">
      <div class="jade-glow"></div>
      <div class="spirit-particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      </div>
      <div class="rune-decoration"></div>
      <div class="realm-badge">{{realm}}</div>
      <div class="corner-rune top-left"></div>
      <div class="corner-rune top-right"></div>
      <div class="corner-rune bottom-left"></div>
      <div class="corner-rune bottom-right"></div>
      <div class="cloud-decoration"></div>
      
      <div class="jade-header">
        <div class="jade-title">{{title}}</div>
        <div class="jade-meta">致 {{recipient}}</div>
      </div>
      
      <div class="jade-content">
        {{content}}
      </div>
      
      <div class="jade-signature">
        <div class="signature-text">{{sender}}</div>
      </div>
    </div>
  </div>
</body>
</html>
