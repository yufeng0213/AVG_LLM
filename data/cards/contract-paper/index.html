<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>契约文书</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #2c1810 0%, #3d2314 100%);
      font-family: 'STKaiti', 'KaiTi', '楷体', serif;
      padding: 20px;
    }
    
    .contract-container {
      position: relative;
      width: 100%;
      max-width: 400px;
    }
    
    .contract-card {
      position: relative;
      background: linear-gradient(180deg, #f5e6c8 0%, #e8d4a8 50%, #f0ddb5 100%);
      padding: 35px 30px;
      box-shadow: 
        0 15px 50px rgba(0, 0, 0, 0.4),
        inset 0 0 30px rgba(139, 90, 43, 0.1);
    }
    
    .paper-texture {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.5' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none;
    }
    
    .contract-border {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      border: 2px solid rgba(139, 90, 43, 0.4);
      pointer-events: none;
    }
    
    .type-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 5px 10px;
      background: rgba(139, 90, 43, 0.2);
      border: 1px solid #8b4513;
      color: #8b4513;
      font-size: 10px;
      letter-spacing: 2px;
    }
    
    .contract-header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid rgba(139, 90, 43, 0.4);
    }
    
    .contract-title {
      font-size: 18px;
      color: #2c1810;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }
    
    .contract-date {
      font-size: 11px;
      color: #5a4a3a;
      letter-spacing: 1px;
    }
    
    .parties-section {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      padding: 10px;
      background: rgba(139, 90, 43, 0.1);
    }
    
    .party-item {
      font-size: 11px;
      text-align: center;
    }
    
    .party-label {
      color: #5a4a3a;
      display: block;
      margin-bottom: 3px;
    }
    
    .party-name {
      color: #2c1810;
      font-weight: bold;
    }
    
    .contract-content {
      color: #2c1810;
      font-size: 12px;
      line-height: 2;
      margin-bottom: 15px;
      text-align: justify;
    }
    
    .terms-section {
      margin-top: 15px;
      padding: 10px;
      background: rgba(139, 90, 43, 0.08);
      border-left: 3px solid #8b4513;
    }
    
    .terms-title {
      font-size: 11px;
      color: #8b4513;
      margin-bottom: 5px;
      letter-spacing: 2px;
    }
    
    .terms-content {
      font-size: 11px;
      color: #5a4a3a;
      line-height: 1.6;
    }
    
    .signature-section {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid rgba(139, 90, 43, 0.3);
    }
    
    .signature-box {
      text-align: center;
      width: 45%;
    }
    
    .signature-line {
      width: 100%;
      height: 1px;
      background: #8b4513;
      margin-bottom: 5px;
    }
    
    .signature-label {
      font-size: 10px;
      color: #5a4a3a;
    }
    
    .seal-stamp {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      background: #c41e3a;
      border-radius: 3px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
      box-shadow: 
        0 2px 8px rgba(196, 30, 58, 0.4),
        inset 0 0 8px rgba(0, 0, 0, 0.2);
      transform: rotate(-5deg);
      writing-mode: vertical-rl;
    }
    
    .corner-decoration {
      position: absolute;
      width: 15px;
      height: 15px;
      border: 1px solid rgba(139, 90, 43, 0.3);
    }
    
    .corner-decoration.top-left { top: 5px; left: 5px; border-right: none; border-bottom: none; }
    .corner-decoration.top-right { top: 5px; right: 5px; border-left: none; border-bottom: none; }
    .corner-decoration.bottom-left { bottom: 5px; left: 5px; border-right: none; border-top: none; }
    .corner-decoration.bottom-right { bottom: 5px; right: 5px; border-left: none; border-top: none; }
  </style>
</head>
<body>
  <div class="contract-container">
    <div class="contract-card">
      <div class="paper-texture"></div>
      <div class="contract-border"></div>
      <div class="type-badge">{{contractType}}</div>
      <div class="corner-decoration top-left"></div>
      <div class="corner-decoration top-right"></div>
      <div class="corner-decoration bottom-left"></div>
      <div class="corner-decoration bottom-right"></div>
      
      <div class="contract-header">
        <div class="contract-title">{{contractTitle}}</div>
        <div class="contract-date">{{date}}</div>
      </div>
      
      <div class="parties-section">
        <div class="party-item">
          <span class="party-label">甲方</span>
          <span class="party-name">{{partyA}}</span>
        </div>
        <div class="party-item">
          <span class="party-label">乙方</span>
          <span class="party-name">{{partyB}}</span>
        </div>
      </div>
      
      <div class="contract-content">
        {{content}}
      </div>
      
      <div class="terms-section">
        <div class="terms-title">条款摘要</div>
        <div class="terms-content">{{terms}}</div>
      </div>
      
      <div class="signature-section">
        <div class="signature-box">
          <div class="signature-line"></div>
          <div class="signature-label">甲方签章</div>
        </div>
        <div class="signature-box">
          <div class="signature-line"></div>
          <div class="signature-label">乙方签章</div>
        </div>
      </div>
      
      <div class="seal-stamp">契约</div>
    </div>
  </div>
</body>
</html>
