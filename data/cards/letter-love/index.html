<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情书</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      font-family: 'Georgia', 'Times New Roman', serif;
      padding: 20px;
    }
    
    .letter-container {
      position: relative;
      width: 100%;
      max-width: 420px;
    }
    
    .envelope {
      position: relative;
      width: 100%;
      height: 280px;
      background: linear-gradient(180deg, #f5e6d3 0%, #e8d4bc 100%);
      border-radius: 8px;
      box-shadow: 
        0 10px 40px rgba(139, 90, 43, 0.3),
        inset 0 2px 0 rgba(255, 255, 255, 0.5);
      overflow: hidden;
    }
    
    .envelope::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, #d4a574 0%, #c49a6c 100%);
      clip-path: polygon(0 0, 50% 100%, 100% 0);
    }
    
    .envelope::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(0deg, rgba(139, 90, 43, 0.1) 0%, transparent 100%);
    }
    
    .wax-seal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -30%);
      width: 60px;
      height: 60px;
      background: radial-gradient(circle at 30% 30%, #e74c3c 0%, #c0392b 50%, #922b21 100%);
      border-radius: 50%;
      box-shadow: 
        0 4px 15px rgba(0, 0, 0, 0.3),
        inset 0 2px 4px rgba(255, 255, 255, 0.3);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .wax-seal::before {
      content: '❤';
      font-size: 24px;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }
    
    .letter {
      position: relative;
      margin-top: -40px;
      background: linear-gradient(180deg, #fffef9 0%, #f9f3e3 100%);
      padding: 40px 35px;
      border-radius: 4px;
      box-shadow: 
        0 15px 50px rgba(139, 90, 43, 0.2),
        0 5px 20px rgba(0, 0, 0, 0.1);
      transform: rotate(-1deg);
    }
    
    .letter::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 27px,
          rgba(200, 180, 160, 0.3) 27px,
          rgba(200, 180, 160, 0.3) 28px
        );
      pointer-events: none;
      opacity: 0.5;
    }
    
    .letter-header {
      text-align: right;
      margin-bottom: 25px;
      font-style: italic;
      color: #8b6914;
      font-size: 14px;
    }
    
    .letter-title {
      font-size: 18px;
      color: #c0392b;
      margin-bottom: 20px;
      text-align: center;
      font-weight: normal;
      letter-spacing: 2px;
    }
    
    .letter-content {
      font-size: 15px;
      line-height: 28px;
      color: #4a4a4a;
      text-align: justify;
      position: relative;
      z-index: 1;
    }
    
    .letter-content p {
      text-indent: 2em;
      margin-bottom: 15px;
    }
    
    .letter-signature {
      text-align: right;
      margin-top: 30px;
      font-style: italic;
      color: #8b6914;
    }
    
    .letter-signature .name {
      font-size: 18px;
      margin-top: 5px;
      font-weight: bold;
    }
    
    .decorative-corner {
      position: absolute;
      width: 40px;
      height: 40px;
      opacity: 0.3;
    }
    
    .decorative-corner.top-left {
      top: 10px;
      left: 10px;
      border-top: 2px solid #c0392b;
      border-left: 2px solid #c0392b;
    }
    
    .decorative-corner.top-right {
      top: 10px;
      right: 10px;
      border-top: 2px solid #c0392b;
      border-right: 2px solid #c0392b;
    }
    
    .decorative-corner.bottom-left {
      bottom: 10px;
      left: 10px;
      border-bottom: 2px solid #c0392b;
      border-left: 2px solid #c0392b;
    }
    
    .decorative-corner.bottom-right {
      bottom: 10px;
      right: 10px;
      border-bottom: 2px solid #c0392b;
      border-right: 2px solid #c0392b;
    }
    
    .rose-decoration {
      position: absolute;
      bottom: 15px;
      left: 15px;
      font-size: 28px;
      opacity: 0.4;
      transform: rotate(-15deg);
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-5px) rotate(0deg); }
    }
    
    .letter:hover {
      animation: float 3s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="letter-container">
    <div class="envelope">
      <div class="wax-seal"></div>
    </div>
    <div class="letter">
      <div class="decorative-corner top-left"></div>
      <div class="decorative-corner top-right"></div>
      <div class="decorative-corner bottom-left"></div>
      <div class="decorative-corner bottom-right"></div>
      
      <div class="letter-header">
        {{date}}
      </div>
      
      <h2 class="letter-title">致 {{recipient}}</h2>
      
      <div class="letter-content">
        {{content}}
      </div>
      
      <div class="letter-signature">
        <div>永远爱你的，</div>
        <div class="name">{{sender}}</div>
      </div>
      
      <div class="rose-decoration">🌹</div>
    </div>
  </div>
</body>
</html>
