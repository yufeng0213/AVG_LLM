<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>极简便签</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      padding: 20px;
    }
    
    .minimalist-container {
      position: relative;
      width: 100%;
      max-width: 350px;
    }
    
    .minimalist-card {
      position: relative;
      background: #fff;
      padding: 30px 25px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
      border-radius: 2px;
    }
    
    .priority-indicator {
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: #333;
    }
    
    .priority-indicator.important { background: #f39c12; }
    .priority-indicator.urgent { background: #e74c3c; }
    
    .minimalist-header {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #eee;
    }
    
    .minimalist-title {
      font-size: 16px;
      color: #333;
      font-weight: 500;
      letter-spacing: 1px;
    }
    
    .minimalist-date {
      font-size: 11px;
      color: #999;
      margin-top: 5px;
    }
    
    .minimalist-content {
      color: #555;
      font-size: 13px;
      line-height: 1.8;
      margin-bottom: 20px;
    }
    
    .minimalist-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 15px;
      border-top: 1px solid #eee;
    }
    
    .priority-badge {
      font-size: 10px;
      color: #999;
      letter-spacing: 1px;
    }
    
    .check-mark {
      width: 20px;
      height: 20px;
      border: 1px solid #ddd;
      border-radius: 2px;
    }
    
    .clean-line {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 30px;
      height: 1px;
      background: #eee;
    }
  </style>
</head>
<body>
  <div class="minimalist-container">
    <div class="minimalist-card">
      <div class="priority-indicator"></div>
      <div class="clean-line"></div>
      
      <div class="minimalist-header">
        <div class="minimalist-title">{{title}}</div>
        <div class="minimalist-date">{{date}}</div>
      </div>
      
      <div class="minimalist-content">
        {{content}}
      </div>
      
      <div class="minimalist-footer">
        <div class="priority-badge">{{priority}}</div>
        <div class="check-mark"></div>
      </div>
    </div>
  </div>
</body>
</html>
