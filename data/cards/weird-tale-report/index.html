<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>异常现象报告</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0a;
      font-family: 'Courier New', monospace;
      padding: 20px;
    }
    
    .report-container {
      position: relative;
      width: 100%;
      max-width: 400px;
    }
    
    .report-card {
      position: relative;
      background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
      border: 1px solid #333;
      padding: 30px 25px;
      box-shadow: 
        0 0 30px rgba(196, 30, 58, 0.2),
        inset 0 0 20px rgba(0, 0, 0, 0.5);
    }
    
    .redacted-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.03) 2px,
          rgba(0, 0, 0, 0.03) 4px
        );
      pointer-events: none;
    }
    
    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(196, 30, 58, 0.5);
      animation: scan 4s linear infinite;
      pointer-events: none;
    }
    
    @keyframes scan {
      0% { top: 0; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }
    
    .header-stripe {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #c41e3a, #8b0000, #c41e3a);
    }
    
    .classification-banner {
      background: #c41e3a;
      color: #fff;
      text-align: center;
      padding: 8px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 4px;
      margin-bottom: 20px;
      animation: pulse-glow 2s ease-in-out infinite;
    }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 5px rgba(196, 30, 58, 0.5); }
      50% { box-shadow: 0 0 15px rgba(196, 30, 58, 0.8); }
    }
    
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px dashed #333;
    }
    
    .report-id {
      font-size: 10px;
      color: #666;
      letter-spacing: 1px;
    }
    
    .threat-badge {
      padding: 3px 8px;
      font-size: 10px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    
    .threat-safe { background: #2ecc71; color: #fff; }
    .threat-low { background: #3498db; color: #fff; }
    .threat-medium { background: #f39c12; color: #000; }
    .threat-high { background: #e74c3c; color: #fff; }
    .threat-critical { background: #8b0000; color: #fff; animation: critical-pulse 1s ease-in-out infinite; }
    
    @keyframes critical-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    .report-title {
      font-size: 16px;
      color: #c41e3a;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #333;
      letter-spacing: 1px;
    }
    
    .report-content {
      color: #aaa;
      font-size: 12px;
      line-height: 1.8;
      margin-bottom: 15px;
    }
    
    .redacted {
      background: #000;
      color: #000;
      padding: 0 5px;
      user-select: none;
    }
    
    .redacted:hover {
      background: #1a1a1a;
      color: #1a1a1a;
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid #222;
    }
    
    .info-item {
      font-size: 10px;
    }
    
    .info-label {
      color: #555;
      display: block;
      margin-bottom: 2px;
    }
    
    .info-value {
      color: #888;
      letter-spacing: 1px;
    }
    
    .warning-box {
      background: rgba(196, 30, 58, 0.1);
      border-left: 3px solid #c41e3a;
      padding: 10px;
      margin-top: 15px;
      font-size: 11px;
      color: #c41e3a;
    }
    
    .warning-box::before {
      content: '⚠ 警告';
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
      letter-spacing: 2px;
    }
    
    .barcode {
      display: flex;
      justify-content: center;
      gap: 2px;
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px dashed #333;
    }
    
    .barcode-line {
      width: 2px;
      background: #333;
    }
    
    .barcode-line:nth-child(odd) { height: 25px; }
    .barcode-line:nth-child(even) { height: 20px; }
    .barcode-line:nth-child(3n) { height: 30px; }
    
    .footer-text {
      text-align: center;
      font-size: 8px;
      color: #333;
      margin-top: 10px;
      letter-spacing: 2px;
    }
    
    .glitch-corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 1px solid rgba(196, 30, 58, 0.3);
    }
    
    .glitch-corner.top-left { top: 5px; left: 5px; border-right: none; border-bottom: none; }
    .glitch-corner.top-right { top: 5px; right: 5px; border-left: none; border-bottom: none; }
    .glitch-corner.bottom-left { bottom: 5px; left: 5px; border-right: none; border-top: none; }
    .glitch-corner.bottom-right { bottom: 5px; right: 5px; border-left: none; border-top: none; }
  </style>
</head>
<body>
  <div class="report-container">
    <div class="report-card">
      <div class="header-stripe"></div>
      <div class="redacted-overlay"></div>
      <div class="scan-line"></div>
      <div class="glitch-corner top-left"></div>
      <div class="glitch-corner top-right"></div>
      <div class="glitch-corner bottom-left"></div>
      <div class="glitch-corner bottom-right"></div>
      
      <div class="classification-banner">{{classification}}</div>
      
      <div class="report-header">
        <div class="report-id">{{reportId}}</div>
        <div class="threat-badge threat-medium">{{threatLevel}}</div>
      </div>
      
      <div class="report-title">{{title}}</div>
      
      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">观察员</span>
          <span class="info-value">{{observer}}</span>
        </div>
        <div class="info-item">
          <span class="info-label">日期</span>
          <span class="info-value">{{date}}</span>
        </div>
      </div>
      
      <div class="report-content">
        {{content}}
      </div>
      
      <div class="warning-box">
        本文档包含敏感信息，未经授权查阅将承担相应后果。
      </div>
      
      <div class="barcode">
        <div class="barcode-line"></div>
        <div class="barcode-line"></div>
        <div class="barcode-line"></div>
        <div class="barcode-line"></div>
        <div class="barcode-line"></div>
        <div class="barcode-line"></div>
        <div class="barcode-line"></div>
        <div class="barcode-line"></div>
        <div class="barcode-line"></div>
        <div class="barcode-line"></div>
        <div class="barcode-line"></div>
        <div class="barcode-line"></div>
        <div class="barcode-line"></div>
        <div class="barcode-line"></div>
        <div class="barcode-line"></div>
      </div>
      
      <div class="footer-text">DOCUMENT END - SECURE ARCHIVE</div>
    </div>
  </div>
</body>
</html>
