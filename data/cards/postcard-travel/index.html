<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行明信片</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #87ceeb 0%, #f5f5f5 100%);
      font-family: 'Georgia', serif;
      padding: 20px;
    }
    
    .postcard-container {
      position: relative;
      width: 100%;
      max-width: 400px;
    }
    
    .postcard-card {
      position: relative;
      background: #fff;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      border-radius: 3px;
    }
    
    .postcard-front {
      position: relative;
      height: 200px;
      background: linear-gradient(135deg, #87ceeb 0%, #98d8c8 50%, #f7dc6f 100%);
      margin-bottom: 15px;
      border-radius: 2px;
      overflow: hidden;
    }
    
    .landscape-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60%;
      background: 
        linear-gradient(180deg, transparent 0%, rgba(34, 139, 34, 0.3) 100%),
        radial-gradient(ellipse at 50% 100%, rgba(139, 90, 43, 0.2) 0%, transparent 50%);
    }
    
    .sun-decoration {
      position: absolute;
      top: 20px;
      right: 30px;
      width: 40px;
      height: 40px;
      background: radial-gradient(circle, #ffd700 0%, #ff8c00 100%);
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }
    
    .location-badge {
      position: absolute;
      bottom: 10px;
      left: 10px;
      padding: 5px 15px;
      background: rgba(255, 255, 255, 0.9);
      color: #333;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      border-radius: 2px;
    }
    
    .postcard-back {
      position: relative;
      padding: 15px;
      background: #f5f5f5;
      border: 1px dashed #ccc;
    }
    
    .stamp-area {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 50px;
      height: 60px;
      background: #fff;
      border: 1px dashed #999;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .stamp-decoration {
      width: 40px;
      height: 50px;
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      border-radius: 2px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 12px;
    }
    
    .greeting-text {
      font-size: 14px;
      color: #333;
      line-height: 1.8;
      margin-bottom: 15px;
      padding-right: 60px;
    }
    
    .greeting-text::first-letter {
      font-size: 20px;
      color: #e74c3c;
    }
    
    .address-area {
      margin-top: 15px;
      padding: 10px;
      background: #fff;
      border: 1px solid #ddd;
      font-size: 12px;
      color: #666;
    }
    
    .address-label {
      font-size: 10px;
      color: #999;
      margin-bottom: 5px;
      letter-spacing: 2px;
    }
    
    .sender-info {
      text-align: right;
      margin-top: 10px;
      font-size: 12px;
      color: #888;
    }
    
    .weather-icon {
      position: absolute;
      top: 15px;
      left: 15px;
      font-size: 20px;
      opacity: 0.8;
    }
    
    .corner-decoration {
      position: absolute;
      width: 10px;
      height: 10px;
      border: 1px solid rgba(0, 0, 0, 0.1);
    }
    
    .corner-decoration.top-left { top: 0; left: 0; border-right: none; border-bottom: none; }
    .corner-decoration.top-right { top: 0; right: 0; border-left: none; border-bottom: none; }
    .corner-decoration.bottom-left { bottom: 0; left: 0; border-right: none; border-top: none; }
    .corner-decoration.bottom-right { bottom: 0; right: 0; border-left: none; border-top: none; }
  </style>
</head>
<body>
  <div class="postcard-container">
    <div class="postcard-card">
      <div class="postcard-front">
        <div class="landscape-overlay"></div>
        <div class="sun-decoration"></div>
        <div class="weather-icon">{{weatherIcon}}</div>
        <div class="location-badge">{{location}}</div>
      </div>
      
      <div class="postcard-back">
        <div class="stamp-area">
          <div class="stamp-decoration">✉</div>
        </div>
        <div class="corner-decoration top-left"></div>
        <div class="corner-decoration top-right"></div>
        <div class="corner-decoration bottom-left"></div>
        <div class="corner-decoration bottom-right"></div>
        
        <div class="greeting-text">
          {{content}}
        </div>
        
        <div class="address-area">
          <div class="address-label">收件人</div>
          {{recipient}}
        </div>
        
        <div class="sender-info">
          {{sender}} · {{date}}
        </div>
      </div>
    </div>
  </div>
</body>
</html>
