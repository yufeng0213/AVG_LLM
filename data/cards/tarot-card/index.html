<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>塔罗牌</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Georgia', serif;
      padding: 20px;
    }
    
    .tarot-container {
      position: relative;
      width: 100%;
      max-width: 320px;
    }
    
    .tarot-card {
      position: relative;
      background: linear-gradient(180deg, #f8f4e8 0%, #e8dcc8 100%);
      padding: 20px 15px;
      box-shadow: 
        0 0 50px rgba(255, 215, 0, 0.2),
        0 15px 50px rgba(0, 0, 0, 0.4);
      border-radius: 10px;
      aspect-ratio: 2/3;
    }
    
    .card-border {
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;
      border: 2px solid rgba(139, 90, 43, 0.5);
      border-radius: 5px;
      pointer-events: none;
    }
    
    .mystic-glow {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at center, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
      animation: glow-pulse 3s ease-in-out infinite;
      pointer-events: none;
      border-radius: 10px;
    }
    
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    
    .card-header {
      text-align: center;
      margin-bottom: 15px;
    }
    
    .card-number {
      font-size: 12px;
      color: #8b4513;
      letter-spacing: 2px;
    }
    
    .card-name {
      font-size: 16px;
      color: #2c1810;
      letter-spacing: 3px;
      margin-top: 5px;
    }
    
    .card-image {
      width: 100%;
      height: 120px;
      background: linear-gradient(180deg, rgba(139, 90, 43, 0.1) 0%, rgba(139, 90, 43, 0.2) 100%);
      margin-bottom: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(139, 90, 43, 0.3);
    }
    
    .card-symbol {
      font-size: 48px;
      color: rgba(139, 90, 43, 0.5);
    }
    
    .meaning-section {
      margin-bottom: 10px;
    }
    
    .meaning-title {
      font-size: 10px;
      color: #8b4513;
      margin-bottom: 5px;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .meaning-title::before {
      content: '✦';
      color: #ffd700;
    }
    
    .meaning-content {
      font-size: 11px;
      color: #2c1810;
      line-height: 1.6;
    }
    
    .arcana-badge {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      padding: 3px 10px;
      background: rgba(139, 90, 43, 0.2);
      border: 1px solid rgba(139, 90, 43, 0.4);
      color: #8b4513;
      font-size: 9px;
      letter-spacing: 1px;
    }
    
    .corner-star {
      position: absolute;
      width: 15px;
      height: 15px;
      color: rgba(255, 215, 0, 0.4);
      font-size: 12px;
    }
    
    .corner-star.top-left { top: 15px; left: 15px; }
    .corner-star.top-right { top: 15px; right: 15px; }
    .corner-star.bottom-left { bottom: 40px; left: 15px; }
    .corner-star.bottom-right { bottom: 40px; right: 15px; }
  </style>
</head>
<body>
  <div class="tarot-container">
    <div class="tarot-card">
      <div class="mystic-glow"></div>
      <div class="card-border"></div>
      <div class="corner-star top-left">★</div>
      <div class="corner-star top-right">★</div>
      <div class="corner-star bottom-left">★</div>
      <div class="corner-star bottom-right">★</div>
      
      <div class="card-header">
        <div class="card-number">{{cardNumber}}</div>
        <div class="card-name">{{cardName}}</div>
      </div>
      
      <div class="card-image">
        <div class="card-symbol">☽</div>
      </div>
      
      <div class="meaning-section">
        <div class="meaning-title">正位</div>
        <div class="meaning-content">{{uprightMeaning}}</div>
      </div>
      
      <div class="meaning-section">
        <div class="meaning-title">逆位</div>
        <div class="meaning-content">{{reversedMeaning}}</div>
      </div>
      
      <div class="arcana-badge">{{arcana}}</div>
    </div>
  </div>
</body>
</html>
