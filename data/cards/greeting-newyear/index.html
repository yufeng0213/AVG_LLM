<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新年贺卡</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Georgia', 'Times New Roman', serif;
      padding: 20px;
      overflow: hidden;
    }
    
    .card-container {
      position: relative;
      width: 100%;
      max-width: 400px;
    }
    
    .card {
      position: relative;
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
      border: 2px solid;
      border-image: linear-gradient(135deg, #ffd700, #ff6b35, #ffd700) 1;
      padding: 45px 40px;
      box-shadow: 
        0 0 60px rgba(255, 215, 0, 0.3),
        0 0 100px rgba(255, 107, 53, 0.2),
        inset 0 0 60px rgba(255, 215, 0, 0.05);
      overflow: hidden;
    }
    
    .firework {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      animation: firework 2s ease-out infinite;
    }
    
    .firework::before,
    .firework::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      animation: firework-particle 2s ease-out infinite;
    }
    
    .firework:nth-child(1) { top: 20px; left: 30px; background: #ff6b6b; animation-delay: 0s; }
    .firework:nth-child(2) { top: 40px; right: 40px; background: #ffd700; animation-delay: 0.5s; }
    .firework:nth-child(3) { top: 60px; left: 60px; background: #4ecdc4; animation-delay: 1s; }
    .firework:nth-child(4) { top: 30px; right: 80px; background: #f38181; animation-delay: 1.5s; }
    
    @keyframes firework {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }
    
    @keyframes firework-particle {
      0% { transform: translate(0, 0); opacity: 1; }
      100% { transform: translate(var(--tx, 20px), var(--ty, 20px)); opacity: 0; }
    }
    
    .lantern {
      position: absolute;
      font-size: 32px;
      animation: sway 3s ease-in-out infinite;
    }
    
    .lantern:nth-child(5) { top: 10px; left: 15px; animation-delay: 0s; }
    .lantern:nth-child(6) { top: 15px; right: 20px; animation-delay: 0.5s; }
    
    @keyframes sway {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }
    
    .gold-border {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      pointer-events: none;
    }
    
    .corner-decoration {
      position: absolute;
      width: 30px;
      height: 30px;
      border: 2px solid #ffd700;
    }
    
    .corner-decoration.top-left { top: 15px; left: 15px; border-right: none; border-bottom: none; }
    .corner-decoration.top-right { top: 15px; right: 15px; border-left: none; border-bottom: none; }
    .corner-decoration.bottom-left { bottom: 15px; left: 15px; border-right: none; border-top: none; }
    .corner-decoration.bottom-right { bottom: 15px; right: 15px; border-left: none; border-top: none; }
    
    .year-display {
      text-align: center;
      font-size: 48px;
      font-weight: bold;
      background: linear-gradient(135deg, #ffd700 0%, #ff6b35 50%, #ffd700 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
      letter-spacing: 5px;
    }
    
    .card-title {
      text-align: center;
      font-size: 36px;
      color: #ffd700;
      margin-bottom: 25px;
      font-weight: bold;
      letter-spacing: 8px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }
    
    .recipient-name {
      text-align: center;
      font-size: 20px;
      color: #ff6b35;
      margin-bottom: 20px;
    }
    
    .card-content {
      font-size: 15px;
      line-height: 30px;
      color: #e0e0e0;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    
    .card-content p {
      margin-bottom: 12px;
    }
    
    .blessing-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 25px 0;
      gap: 15px;
    }
    
    .blessing-divider span {
      font-size: 20px;
    }
    
    .blessing-divider::before,
    .blessing-divider::after {
      content: '';
      width: 50px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #ffd700, transparent);
    }
    
    .sender-info {
      text-align: right;
      margin-top: 25px;
      color: #a0a0a0;
      font-style: italic;
    }
    
    .sender-info .sender {
      font-size: 16px;
      color: #ffd700;
      font-weight: bold;
      font-style: normal;
    }
    
    .sparkle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #ffd700;
      border-radius: 50%;
      animation: twinkle 2s ease-in-out infinite;
    }
    
    .sparkle:nth-child(7) { top: 80px; left: 50px; animation-delay: 0s; }
    .sparkle:nth-child(8) { top: 120px; right: 60px; animation-delay: 0.3s; }
    .sparkle:nth-child(9) { bottom: 100px; left: 70px; animation-delay: 0.6s; }
    .sparkle:nth-child(10) { bottom: 140px; right: 50px; animation-delay: 0.9s; }
    .sparkle:nth-child(11) { top: 180px; left: 30px; animation-delay: 1.2s; }
    .sparkle:nth-child(12) { top: 200px; right: 40px; animation-delay: 1.5s; }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }
    
    .fu-character {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 40px;
      opacity: 0.15;
    }
  </style>
</head>
<body>
  <div class="card-container">
    <div class="card">
      <div class="firework"></div>
      <div class="firework"></div>
      <div class="firework"></div>
      <div class="firework"></div>
      <div class="lantern">🏮</div>
      <div class="lantern">🏮</div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
      
      <div class="gold-border"></div>
      <div class="corner-decoration top-left"></div>
      <div class="corner-decoration top-right"></div>
      <div class="corner-decoration bottom-left"></div>
      <div class="corner-decoration bottom-right"></div>
      
      <div class="year-display">{{year}}</div>
      <h1 class="card-title">新年快乐</h1>
      
      <div class="recipient-name">致 {{recipient}}</div>
      
      <div class="card-content">
        {{content}}
      </div>
      
      <div class="blessing-divider">
        <span>🧧</span>
        <span>恭</span>
        <span>喜</span>
        <span>发</span>
        <span>财</span>
        <span>🧧</span>
      </div>
      
      <div class="sender-info">
        <div>你的朋友</div>
        <div class="sender">{{sender}}</div>
      </div>
      
      <div class="fu-character">福</div>
    </div>
  </div>
</body>
</html>
