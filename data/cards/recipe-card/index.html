<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食谱卡片</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fff5e6 0%, #f5e6d3 100%);
      font-family: 'Georgia', serif;
      padding: 20px;
    }
    
    .recipe-container {
      position: relative;
      width: 100%;
      max-width: 380px;
    }
    
    .recipe-card {
      position: relative;
      background: #fff;
      padding: 30px 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      border-radius: 5px;
    }
    
    .header-decoration {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 8px;
      background: linear-gradient(90deg, #e67e22, #f39c12, #e67e22);
      border-radius: 5px 5px 0 0;
    }
    
    .cuisine-badge {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 5px 10px;
      background: rgba(230, 126, 34, 0.1);
      border: 1px solid #e67e22;
      color: #e67e22;
      font-size: 10px;
      letter-spacing: 1px;
    }
    
    .recipe-header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px dashed rgba(230, 126, 34, 0.3);
    }
    
    .recipe-name {
      font-size: 18px;
      color: #e67e22;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }
    
    .recipe-author {
      font-size: 11px;
      color: #999;
    }
    
    .ingredients-section {
      margin-bottom: 15px;
      padding: 15px;
      background: rgba(243, 156, 18, 0.05);
      border-radius: 3px;
    }
    
    .section-title {
      font-size: 12px;
      color: #e67e22;
      margin-bottom: 10px;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .section-title::before {
      content: '🍳';
      font-size: 14px;
    }
    
    .ingredients-list {
      font-size: 12px;
      color: #555;
      line-height: 1.8;
    }
    
    .steps-section {
      margin-bottom: 15px;
    }
    
    .steps-content {
      font-size: 12px;
      color: #333;
      line-height: 1.8;
    }
    
    .tips-section {
      margin-top: 15px;
      padding: 10px;
      background: rgba(230, 126, 34, 0.1);
      border-left: 3px solid #f39c12;
    }
    
    .tips-content {
      font-size: 11px;
      color: #666;
      line-height: 1.6;
    }
    
    .utensil-decoration {
      position: absolute;
      bottom: 15px;
      left: 15px;
      width: 25px;
      height: 25px;
      opacity: 0.2;
    }
    
    .utensil-decoration::before {
      content: '🥄';
      font-size: 18px;
    }
    
    .corner-decoration {
      position: absolute;
      width: 10px;
      height: 10px;
      border: 1px solid rgba(230, 126, 34, 0.2);
    }
    
    .corner-decoration.top-left { top: 5px; left: 5px; border-right: none; border-bottom: none; }
    .corner-decoration.top-right { top: 5px; right: 5px; border-left: none; border-bottom: none; }
    .corner-decoration.bottom-left { bottom: 5px; left: 5px; border-right: none; border-top: none; }
    .corner-decoration.bottom-right { bottom: 5px; right: 5px; border-left: none; border-top: none; }
  </style>
</head>
<body>
  <div class="recipe-container">
    <div class="recipe-card">
      <div class="header-decoration"></div>
      <div class="cuisine-badge">{{cuisineType}}</div>
      <div class="utensil-decoration"></div>
      <div class="corner-decoration top-left"></div>
      <div class="corner-decoration top-right"></div>
      <div class="corner-decoration bottom-left"></div>
      <div class="corner-decoration bottom-right"></div>
      
      <div class="recipe-header">
        <div class="recipe-name">{{recipeName}}</div>
        <div class="recipe-author">by {{author}}</div>
      </div>
      
      <div class="ingredients-section">
        <div class="section-title">食材清单</div>
        <div class="ingredients-list">
          {{ingredients}}
        </div>
      </div>
      
      <div class="steps-section">
        <div class="section-title">烹饪步骤</div>
        <div class="steps-content">
          {{steps}}
        </div>
      </div>
      
      <div class="tips-section">
        <div class="tips-content">
          💡 {{tips}}
        </div>
      </div>
    </div>
  </div>
</body>
</html>
